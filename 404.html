<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda no encontrada — ProductSpot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a1628 0%, #0d2240 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #f1f5f9;
    }
    .card {
      text-align: center;
      max-width: 420px;
      width: 100%;
    }
    .card img { height: 48px; width: auto; margin-bottom: 40px; }
    .icon {
      font-size: 3.5rem;
      margin-bottom: 20px;
      display: block;
    }
    h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 12px; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 32px; font-size: .95rem; }
    .btn {
      display: inline-block;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      padding: 13px 28px;
      border-radius: 10px;
      font-weight: 700;
      font-size: .95rem;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
    .slug { color: #5b8ab5; font-family: monospace; word-break: break-all; }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://vowsvdzjyvpalyvkfxte.supabase.co/storage/v1/object/public/assets/Sleek%20Logotype%20for%20ProductSpot%20Featuring%20Spotlight.png"
         alt="ProductSpot" />
    <span class="icon">🔍</span>
    <h1>Tienda no encontrada</h1>
    <p>
      El catálogo <span class="slug" id="slugDisplay"></span> no existe o fue eliminado.
      Verifica el enlace o visita nuestra página principal.
    </p>
    <a href="landing.html" class="btn">Ir a ProductSpot →</a>
  </div>
  <script>
    const slug = new URLSearchParams(window.location.search).get('s');
    const el = document.getElementById('slugDisplay');
    if (slug && el) el.textContent = `"${slug}"`;
    else if (el) el.parentElement.innerHTML = el.parentElement.innerHTML.replace(
      'El catálogo <span class="slug" id="slugDisplay"></span> no existe o fue eliminado.',
      'Este catálogo no existe o fue eliminado.'
    );
  </script>
</body>
</html>
